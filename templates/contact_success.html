{% extends "base.html" %}

{% block title %}Message Sent — {{ site_settings.site_name }}{% endblock %}

{% block content %}
<section class="py-24">
    <div class="max-w-2xl mx-auto px-4 text-center">
        <div class="bg-white rounded-2xl p-12 shadow-sm">
            <p class="text-6xl mb-6">🌻</p>
            <h1 class="font-heading text-3xl font-bold text-garden-800 mb-4">Thank You!</h1>
            <p class="text-gray-600 text-lg mb-8">
                Your message has been received. We'll get back to you as soon as possible,
                usually within one business day.
            </p>
            <a href="{% url 'home' %}"
               class="inline-block px-6 py-3 bg-garden-600 text-white font-semibold rounded-full hover:bg-garden-700 transition">
                Back to Home
            </a>
        </div>
    </div>
</section>
{% endblock %}
